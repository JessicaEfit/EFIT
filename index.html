  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz E-FIT | Avaliação Rápida</title>
  <meta name="description" content="Quiz de qualificação E-FIT para aula experimental e atendimento via WhatsApp." />

  <!-- Fonte parecida com a imagem (forte/itálica) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,800;1,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page-bg"></div>

  <main class="quiz-shell">
    <section class="quiz-card" id="quizCard">
      <header class="quiz-header">
        <img src="./logo.png" alt="Logo E-FIT" class="quiz-logo" onerror="this.style.display='none'" />
        <h1 class="quiz-title">Descubra a melhor forma de começar na E-FIT</h1>
        <p class="quiz-subtitle">
          Responda perguntas rápidas para indicar o caminho ideal de treino e falar com nossa atendente no WhatsApp.
        </p>

        <div class="progress-wrap" aria-label="Progresso do quiz">
          <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <p class="progress-text" id="progressText">PERGUNTA 1 DE 8</p>
        </div>
      </header>

      <div class="quiz-content">
        <div class="question-container fade-enter" id="questionContainer"></div>
        <div class="helper-text" id="helperText">Toque em uma das opções para continuar.</div>
      </div>
    </section>
  </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./script.js"></script>
</body>
</html>
